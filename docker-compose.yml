###############################################################################
# Full tr-engine stack
#
# Bind all external ports to a dedicated IP on the VM. Assign the IP to your
# VM's NIC in Proxmox (or via /etc/network/interfaces), then set BIND_IP in .env.
#
# Externally reachable:
#   BIND_IP:443      → Caddy → tr-engine.luxprimatech.com (HTTPS)
#   BIND_IP:443      → Caddy → tr-dashboard.luxprimatech.com (HTTPS)
#   BIND_IP:1883     → mosquitto (TCP direct)
#
# Internal only:
#   postgres
#
# DNS records (all A records to BIND_IP):
#   tr-engine.luxprimatech.com     → Cloudflare proxied OK
#   tr-dashboard.luxprimatech.com  → Cloudflare proxied OK
#   mqtt.luxprimatech.com          → DNS only (gray cloud)
#
# Quick start:
#   cp sample.env .env   # set BIND_IP and credentials
#   mkdir -p caddy mosquitto
#   # generate mosquitto passwd file (see below)
#   docker compose up -d
#
# Generate mosquitto password file:
#   docker run --rm -v ./mosquitto:/mosquitto/config eclipse-mosquitto:2 \
#     mosquitto_passwd -b -c /mosquitto/config/passwd trengine YOUR_PASSWORD
###############################################################################

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trengine}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trengine}
      POSTGRES_DB: ${POSTGRES_DB:-trengine}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trengine}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "${BIND_IP}:1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto-data:/mosquitto/data
    restart: unless-stopped

  tr-engine:
    image: ghcr.io/lumenprima/tr-engine:latest
    env_file:
      - path: ./.env
        required: false
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-trengine}:${POSTGRES_PASSWORD:-trengine}@postgres:5432/${POSTGRES_DB:-trengine}?sslmode=disable
      MQTT_BROKER_URL: tcp://mosquitto:1883
      MQTT_USERNAME: ${MQTT_USERNAME:-trengine}
      MQTT_PASSWORD: ${MQTT_PASSWORD:-}
      AUDIO_DIR: /data/audio
    volumes:
      - ./audio:/data/audio
      # Optional: TR auto-discovery (set TR_DIR=/tr-config in .env)
      # - /path/to/trunk-recorder:/tr-config:ro
      # Optional: serve TR audio directly (set TR_AUDIO_DIR=/tr-audio in .env)
      # - /path/to/trunk-recorder/audio:/tr-audio:ro
      # Optional: web UI override (changes apply without restart)
      # - ./web:/opt/tr-engine/web
    depends_on:
      postgres:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped

  tr-dashboard:
    image: ghcr.io/lumenprima/tr-dashboard:latest
    environment:
      TR_ENGINE_URL: http://tr-engine:8080
      TR_AUTH_TOKEN: ${AUTH_TOKEN:-}
    depends_on:
      - tr-engine
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "${BIND_IP}:80:80"
      - "${BIND_IP}:443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - tr-engine
      - tr-dashboard
    restart: unless-stopped

  # Optional: Prometheus metrics for PostgreSQL
  # postgres-exporter:
  #   image: prometheuscommunity/postgres-exporter:latest
  #   ports:
  #     - "${BIND_IP}:9187:9187"
  #   environment:
  #     DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-trengine}:${POSTGRES_PASSWORD:-trengine}@postgres:5432/${POSTGRES_DB:-trengine}?sslmode=disable
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   restart: unless-stopped

volumes:
  mosquitto-data:
  caddy-data:
  caddy-config:
